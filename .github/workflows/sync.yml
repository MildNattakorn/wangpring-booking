#name: Auto Sync Google Sheets

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

# DISABLED - Service Account access issue
# To re-enable, fix Service Account permissions in Google Sheets

jobs:
  sync:
    runs-on: ubuntu-latest
    if: false  # Disabled
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install gspread oauth2client
          
      - name: Sync Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT" > credentials.json
          python sync.py
          
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-sync: Update booking data"
          git push
