<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วังปริงแคมป์ - ตารางจอง</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>🏕️ วังปริงแคมป์ ทุ่งสง</h1>
            <p>ตารางจองห้องพักประจำวัน</p>
        </div>
        <div class="header-right">
            <div class="weather-card">
                <span class="weather-icon" id="weatherIcon">⛅</span>
                <div class="weather-info">
                    <span class="temp" id="temp">--°C</span>
                    <span class="condition" id="condition">กำลังโหลด...</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="date-selector">
            <label for="datePicker">📅 เลือกวันที่:</label>
            <input type="date" id="datePicker">
        </section>

        <section class="summary">
            <div class="summary-card">
                <span class="summary-icon">🏠</span>
                <span class="summary-value" id="totalRooms">0</span>
                <span class="summary-label">ห้องที่จองวันนี้</span>
            </div>
        </section>

        <section class="bookings">
            <h2>📋 รายการจอง</h2>
            <div id="bookingsList">
                <p class="loading">กรุณาเลือกวันที่...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>📡 ข้อมูลอัปเดตอัตโนมัติ</p>
    </footer>

    <!-- Modal for adding note -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeNoteModal()">&times;</span>
            <h3>📝 เพิ่มโน๊ต</h3>
            <input type="hidden" id="modalRoomKey">
            <textarea id="noteText" placeholder="พิมพ์โน๊ตที่ต้องการ..."></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeNoteModal()">ยกเลิก</button>
                <button class="btn-save" onclick="saveNote()">บันทึก</button>
            </div>
        </div>
    </div>

    <!-- Modal for viewing note -->
    <div id="viewNoteModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeViewModal()">&times;</span>
            <h3>📝 โน๊ต</h3>
            <div id="viewNoteContent"></div>
            <div class="modal-buttons">
                <button class="btn-close" onclick="closeViewModal()">ปิด</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
