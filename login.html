<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - วังปริงแคมป์</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d5a27 0%, #4a7c42 50%, #2d5a27 100%);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 15px;
        }
        
        .title {
            color: #1a472a;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
        }
        
        .login-btn {
            display: inline-block;
            width: 100%;
            padding: 18px 40px;
            background: linear-gradient(135deg, #2d5a27 0%, #4a7c42 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(45, 90, 39, 0.4);
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 350px;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4a7c42;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .error-msg {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo.jpg" alt="วังปริงแคมป์" class="logo">
        <h1 class="title">ระบบวังปริงแคมป์ทุ่งสง</h1>
        <a href="#" class="login-btn" onclick="showLoginModal()">เข้าสู่ระบบ</a>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLoginModal()">✕</span>
            <h2 style="margin-bottom: 20px; color: #2d5a27;">🔐 เข้าสู่ระบบ</h2>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="username" required>
                </div>
                
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>
                
                <div style="margin-top: 15px; text-align: left;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="rememberMe" style="width: 18px; height: 18px;">
                        <span style="font-size: 0.9rem;">จดจำการเข้าสู่ระบบ</span>
                    </label>
                </div>
                
                <p id="errorMsg" class="error-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</p>
            </form>
        </div>
    </div>

    <script>
        // Check if already logged in
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (currentUser) {
            window.location.href = 'index.html';
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.add('show');
            document.getElementById('username').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('loginForm').reset();
            document.getElementById('errorMsg').classList.remove('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('users.json');
                const data = await response.json();
                
                const user = data.users.find(u => u.username.toLowerCase() === username && u.password === password);
                
                if (user) {
                    const userData = {
                        name: user.name,
                        position: user.position,
                        role: user.role,
                        permissions: user.permissions,
                        loginTime: Date.now()
                    };
                    
                    const rememberMe = document.getElementById('rememberMe').checked;
                    if (rememberMe) {
                        localStorage.setItem('currentUser', JSON.stringify(userData));
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        sessionStorage.setItem('currentUser', JSON.stringify(userData));
                    }
                    
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('errorMsg').classList.add('show');
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
                document.getElementById('errorMsg').classList.add('show');
            }
        }

        // Close modal when clicking outside
        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLoginModal();
            }
        });
    </script>
</body>
</html>
